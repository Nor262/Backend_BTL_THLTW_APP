services:
  mysql:
    image: mysql:8.0
    container_name: btl_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: btl_db
      MYSQL_USER: btl_user
      MYSQL_PASSWORD: btl_password
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - btl_network

  redis:
    image: redis:7-alpine
    container_name: btl_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - btl_network

  app:
    build: .
    container_name: btl_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://btl_user:btl_password@mysql:3306/btl_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super-secret-key
      - NODE_ENV=production
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - btl_network

networks:
  btl_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
